name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint & TypeCheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      
      - run: npm run lint
      
      - run: npm run type-check
      
      - run: npm run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PREPROD || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_PREPROD || 'dummy' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PREPROD || 'dummy' }}

  deploy-preprod:
    name: Deploy Preprod (Supabase Cloud)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/develop'
    environment: preproduction
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push DB Migrations to Supabase Cloud
        run: supabase db push --project-ref ${{ secrets.PREPROD_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.PREPROD_SUPABASE_ACCESS_TOKEN }}
          
      - name: Deploy Edge Functions to Supabase Cloud
        run: supabase functions deploy --project-ref ${{ secrets.PREPROD_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.PREPROD_SUPABASE_ACCESS_TOKEN }}
          
      # Le déploiement du code Next.js vers Vercel est géré automatiquement
      # via l'intégration Vercel pour GitHub sur la branche develop.

  deploy-prod:
    name: Deploy Prod (VPS & Self-Hosted DB)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main'
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push DB Migrations to VPS (Self-hosted)
        run: supabase db push --db-url ${{ secrets.PROD_DB_URL }}
      
      - name: Deploy Next.js to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/promote-connect
            git pull origin main
            npm ci
            npm run build
            pm2 restart promote-connect
